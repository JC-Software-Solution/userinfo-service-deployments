apiVersion: apps/v1
kind: Deployment
metadata:
  name: userinfo-service
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: userinfo-service
          image: userinfo-service-app-image
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 40
            failureThreshold: 8
          resources:
            limits:
              memory: 256Mi
              cpu: 100m
            requests:
              memory: 256Mi
              cpu: 100m
          