apiVersion: apps/v1
kind: Deployment
metadata:
  name: userinfo-service
spec:
  template:
    spec:
      containers:
        - name: userinfo-service
          image: userinfo-service-app-image
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 40
            failureThreshold: 8
          resources:
            requests:
              memory: 512Mi
              cpu: 500m
            limits:
              memory: 512Mi
              cpu: "1"
          